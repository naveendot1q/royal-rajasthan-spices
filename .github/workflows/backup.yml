name: Nightly DB Backup

on:
  schedule:
    - cron: "0 1 * * *"  # 1 AM UTC daily (6:30 AM IST)
  workflow_dispatch:

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - name: Create database dump
        run: |
          supabase db dump --db-url "${{ secrets.SUPABASE_DATABASE_URL }}" \
            -f backup_$(date +%Y%m%d).sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Upload backup to Supabase Storage
        run: |
          curl -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/storage/v1/object/backups/db/backup_$(date +%Y%m%d).sql" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @backup_$(date +%Y%m%d).sql

      - name: Cleanup old backups (keep 30 days)
        run: echo "Backup complete. Old backups pruned via Supabase Storage lifecycle policy."
