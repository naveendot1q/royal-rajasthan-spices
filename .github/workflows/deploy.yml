name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  migrate-database:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-customer-web:
    name: Deploy Customer Web
    runs-on: ubuntu-latest
    needs: [migrate-database]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_CUSTOMER_PROJECT_ID }}
          working-directory: apps/customer-web
          vercel-args: --prod
          scope: ${{ secrets.VERCEL_ORG_ID }}

  deploy-admin-panel:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest
    needs: [migrate-database]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: apps/admin-panel
          vercel-args: --prod
          scope: ${{ secrets.VERCEL_ORG_ID }}

  sync-meilisearch:
    name: Sync Meilisearch Index
    runs-on: ubuntu-latest
    needs: [deploy-customer-web]
    steps:
      - uses: actions/checkout@v4
      - name: Trigger product re-index
        run: |
          curl -X POST "${{ vars.NEXT_PUBLIC_APP_URL }}/api/products/sync-all" \
            -H "x-revalidate-token: ${{ secrets.REVALIDATE_TOKEN }}" \
            -H "Content-Type: application/json" || true

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-customer-web, deploy-admin-panel]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "🌶 Royal Rajasthan Spice Market deployed!"
          echo "Customer Web: https://shop.royalrajasthanspices.com"
          echo "Admin Panel: https://admin.royalrajasthanspices.com"
