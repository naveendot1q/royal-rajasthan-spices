<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Royal Rajasthan Spice Market</title>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #FDF6E3; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; }
    .container { max-width: 400px; }
    .emoji { font-size: 80px; margin-bottom: 20px; }
    h1 { color: #6B1A1A; font-size: 28px; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    button { background: #B8860B; color: white; border: none; padding: 14px 28px; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; }
    button:hover { background: #9A6F09; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🌶</div>
    <h1>You're Offline</h1>
    <p>It seems you've lost your internet connection. Our spices are still waiting for you when you're back online!</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
